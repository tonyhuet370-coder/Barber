<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin - Barber Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0f1114;
        --surface: #181d24;
        --surface-2: #222934;
        --ink: #f2ede6;
        --muted: #b9b1a5;
        --accent: #c06a3c;
        --accent-2: #8f3f24;
        --ok: #58c487;
        --danger: #e67b7b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #101318, #1b2028);
      }

      .wrap {
        max-width: 1150px;
        margin: 0 auto;
        padding: 1rem;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      h1 {
        font-family: "Oswald", sans-serif;
        margin: 0;
      }

      .muted {
        color: var(--muted);
        margin-top: 0.3rem;
      }

      .alert {
        padding: 0.85rem 1rem;
        background: rgba(192, 106, 60, 0.14);
        border-left: 4px solid var(--accent);
        border-radius: 10px;
        margin-bottom: 1rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .stat-card,
      .card {
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      }

      .stat-card {
        padding: 1rem;
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .stat-value {
        font-size: 1.8rem;
        font-weight: 700;
        margin-top: 0.35rem;
      }

      .card {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        vertical-align: middle;
      }

      th {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .badge {
        display: inline-block;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .badge.confirme { background: rgba(88, 196, 135, 0.16); color: var(--ok); }
      .badge.termine { background: rgba(83, 161, 255, 0.16); color: #78adff; }
      .badge.annule { background: rgba(230, 123, 123, 0.16); color: var(--danger); }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.5rem 0.8rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
      }

      .btn-secondary {
        background: var(--surface-2);
        color: var(--ink);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .empty {
        padding: 1.2rem;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 800px) {
        .stats {
          grid-template-columns: 1fr;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>Dashboard du salon</h1>
          <p class="muted">Les rendez-vous se placent automatiquement ici des qu'un client reserve.</p>
        </div>
        <button id="logout-btn" class="btn-secondary">Se deconnecter</button>
      </div>

      <div id="alert" class="alert" hidden>Aucune nouvelle notification pour le moment.</div>

      <section class="stats">
        <div class="stat-card">
          <div class="stat-label">Rendez-vous aujourd'hui</div>
          <div id="today-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">A venir</div>
          <div id="upcoming-count" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Confirmes</div>
          <div id="confirmed-count" class="stat-value">0</div>
        </div>
      </section>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Heure</th>
              <th>Client</th>
              <th>Email</th>
              <th>Service</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty-state" class="empty" hidden>Aucun rendez-vous pour le moment.</div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
