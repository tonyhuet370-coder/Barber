<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion Admin - Barber Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0f1114;
        --surface: #171c23;
        --ink: #f2ede6;
        --muted: #b9b1a5;
        --accent: #c06a3c;
        --accent-2: #8f3f24;
        --danger: #ff7d7d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: "Manrope", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #101319, #1c2129);
      }

      .login-card {
        width: min(100%, 420px);
        background: rgba(23, 28, 35, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 1.2rem;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        font-family: "Oswald", sans-serif;
        margin: 0 0 0.35rem;
      }

      p {
        color: var(--muted);
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 0.85rem;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-weight: 600;
      }

      input {
        border: 1px solid #44505f;
        border-radius: 10px;
        padding: 0.75rem 0.85rem;
        background: #10141a;
        color: var(--ink);
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1rem;
        font: inherit;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        cursor: pointer;
      }

      .message {
        min-height: 1.2rem;
        color: var(--danger);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Connexion admin</h1>
      <p>Acces reserve au coiffeur pour gerer les rendez-vous.</p>

      <form id="login-form">
        <label>
          Identifiant
          <input id="username" name="username" type="text" placeholder="admin" required />
        </label>

        <label>
          Mot de passe
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </label>

        <button type="submit">Se connecter</button>
        <p id="message" class="message"></p>
      </form>
    </div>

    <script>
      const form = document.querySelector("#login-form");
      const messageEl = document.querySelector("#message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        messageEl.textContent = "";

        const formData = new FormData(form);
        const payload = {
          username: formData.get("username"),
          password: formData.get("password")
        };

        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          messageEl.textContent = data.error || "Connexion impossible.";
          return;
        }

        window.location.href = "/admin";
      });
    </script>
  </body>
</html>
